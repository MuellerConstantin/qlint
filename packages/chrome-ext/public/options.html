<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>qlint</title>
    <link rel="stylesheet" href="styles/codemirror.css" />
    <link rel="stylesheet" href="styles/material-darker.css" />
    <link rel="stylesheet" href="styles/options.css" />
  </head>
  <body>
    <header class="page-header">
      <h1 id="options-title">qlint</h1>
      <p id="options-subtitle" class="subtitle"></p>
    </header>
    <main class="page-body">
      <form id="options-form" novalidate>
        <span id="options-config-label" class="field-label"></span>
        <p id="options-config-help" class="field-help"></p>
        <div id="options-config" class="editor-mount" aria-labelledby="options-config-label"></div>
        <div id="options-feedback" class="feedback" role="status" aria-live="polite" hidden></div>
        <div class="actions">
          <button type="submit" id="options-save" class="button button-primary"></button>
          <button type="button" id="options-reset" class="button button-secondary"></button>
        </div>
      </form>
    </main>
    <script src="options.js" type="module"></script>
  </body>
</html>
