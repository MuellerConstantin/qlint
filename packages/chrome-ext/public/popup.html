<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>qlint</title>
    <style>
      body {
        font:
          13px system-ui,
          sans-serif;
        margin: 0;
        padding: 12px 14px;
        min-width: 280px;
        color: #1f2937;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #d4d4d8;
        flex-shrink: 0;
      }

      .dot.active {
        background: #16a34a;
      }

      .dot.inactive {
        background: #dc2626;
      }

      button {
        margin-top: 10px;
        width: 100%;
        padding: 6px 10px;
        font: inherit;
        cursor: pointer;
      }

      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="label">qlint: …</span>
    </div>
    <button id="grant" hidden>Enable qlint for this page</button>
    <script src="popup.js" type="module"></script>
  </body>
</html>
