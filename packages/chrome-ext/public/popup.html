<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>qlint</title>
    <link rel="stylesheet" href="styles/popup.css" />
  </head>
  <body>
    <div class="status">
      <span id="status-dot" class="dot"></span>
      <span id="status-label">qlint: Loading...</span>
      <button id="settings-button" class="icon-button" type="button">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path
            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
          />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </button>
    </div>
    <button id="fix-all-button" hidden></button>
    <div id="summary" class="summary" hidden>
      <span class="count" data-severity="error"><span class="count-dot"></span><span id="count-error">0</span></span>
      <span class="count" data-severity="warning"
        ><span class="count-dot"></span><span id="count-warning">0</span></span
      >
      <span class="count" data-severity="info"><span class="count-dot"></span><span id="count-info">0</span></span>
    </div>
    <button id="grant-button" hidden>Enable qlint for this page</button>
    <script src="popup.js" type="module"></script>
  </body>
</html>
